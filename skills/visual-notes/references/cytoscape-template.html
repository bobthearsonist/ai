<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>__TITLE__</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-overlay: rgba(255, 255, 255, 0.92);
    --text: #1e1e2e;
    --text-muted: #5c5f77;
    --border: #ccd0da;
    --edge: #8c8fa1;
    --edge-strong: #5c5f77;
    --edge-weak: #bcc0cc;
    --edge-highlight: #4c4f69;
    --node-text: #1e1e2e;
    --label-bg: #ffffff;
    --completed: #40a02b; --completed-bg: #a6e3a1;
    --active: #df8e1d; --active-bg: #f9e2af;
    --ctx: #1e66f5; --ctx-bg: #89b4fa;
    --blocked: #d20f39; --blocked-bg: #f38ba8;
  }
  :root.dark {
    --bg: #1e1e2e;
    --bg-overlay: rgba(30, 30, 46, 0.92);
    --text: #cdd6f4;
    --text-muted: #a6adc8;
    --border: #45475a;
    --edge: #585b70;
    --edge-strong: #a6adc8;
    --edge-weak: #45475a;
    --edge-highlight: #cdd6f4;
    --node-text: #1e1e2e;
    --label-bg: #1e1e2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
  #cy { width: 100%; height: 100vh; }
  .legend { position: absolute; top: 12px; right: 12px; background: var(--bg-overlay); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 11px; line-height: 1.6; z-index: 10; }
  .legend-title { font-weight: 600; margin-bottom: 4px; color: var(--text); font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .header { position: absolute; top: 12px; left: 12px; z-index: 10; font-size: 13px; }
  .header h1 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .header .subtitle { color: var(--text-muted); font-size: 11px; }
</style>
</head>
<body>
<div class="header">
  <h1>__HEADER__</h1>
  <div class="subtitle">__SUBTITLE__</div>
</div>
<div class="legend">
  <div class="legend-title">Status</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--completed-bg)"></div> Completed</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--active-bg)"></div> In Progress</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--ctx-bg)"></div> Context</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blocked-bg)"></div> Blocked</div>
  <div class="legend-title" style="margin-top: 6px;">Type</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--text-muted); border-radius: 2px;"></div> System</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--text-muted)"></div> Task</div>
</div>
<div id="cy"></div>
<script>
// Theme detection: read Obsidian parent, fall back to OS preference
function detectDark() {
  try { var p = window.parent.document.body; if (p) return p.classList.contains('theme-dark'); } catch(e) {}
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function applyTheme() { document.documentElement.classList.toggle('dark', detectDark()); }
applyTheme();
var _lastDark = detectDark();
setInterval(function() { var d = detectDark(); if (d !== _lastDark) { _lastDark = d; applyTheme(); if (typeof refreshCytoscapeTheme === 'function') refreshCytoscapeTheme(); } }, 2000);
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() { applyTheme(); if (typeof refreshCytoscapeTheme === 'function') refreshCytoscapeTheme(); });
</script>
<script>/* __CYTOSCAPE_JS__ */</script>
<script>
var cs = getComputedStyle(document.documentElement);
var T = {};
function readThemeVars() {
  var cs = getComputedStyle(document.documentElement);
  T = { bg: cs.getPropertyValue('--bg').trim(), text: cs.getPropertyValue('--text').trim(), textMuted: cs.getPropertyValue('--text-muted').trim(), border: cs.getPropertyValue('--border').trim(), edge: cs.getPropertyValue('--edge').trim(), edgeStrong: cs.getPropertyValue('--edge-strong').trim(), edgeWeak: cs.getPropertyValue('--edge-weak').trim(), edgeHighlight: cs.getPropertyValue('--edge-highlight').trim(), nodeText: cs.getPropertyValue('--node-text').trim(), labelBg: cs.getPropertyValue('--label-bg').trim(), completedBg: cs.getPropertyValue('--completed-bg').trim(), completed: cs.getPropertyValue('--completed').trim(), activeBg: cs.getPropertyValue('--active-bg').trim(), active: cs.getPropertyValue('--active').trim(), ctxBg: cs.getPropertyValue('--ctx-bg').trim(), ctx: cs.getPropertyValue('--ctx').trim(), blockedBg: cs.getPropertyValue('--blocked-bg').trim(), blocked: cs.getPropertyValue('--blocked').trim() };
}
readThemeVars();

var cy = cytoscape({
  container: document.getElementById('cy'),
  style: [
    { selector: 'node', style: { 'label': 'data(label)', 'text-wrap': 'wrap', 'text-max-width': '100px', 'font-size': '11px', 'text-valign': 'center', 'text-halign': 'center', 'color': T.nodeText, 'font-weight': '500', 'width': 'label', 'height': 'label', 'padding': '12px', 'shape': 'round-rectangle', 'border-width': 2, 'border-color': T.border }},
    { selector: '.completed', style: { 'background-color': T.completedBg, 'border-color': T.completed }},
    { selector: '.active', style: { 'background-color': T.activeBg, 'border-color': T.active }},
    { selector: '.context', style: { 'background-color': T.ctxBg, 'border-color': T.ctx }},
    { selector: '.blocked', style: { 'background-color': T.blockedBg, 'border-color': T.blocked }},
    { selector: '.system', style: { 'shape': 'round-rectangle' }},
    { selector: '.task', style: { 'shape': 'ellipse' }},
    { selector: '.decision', style: { 'shape': 'diamond', 'padding': '16px' }},
    { selector: 'edge', style: { 'label': 'data(label)', 'font-size': '9px', 'color': T.textMuted, 'text-background-color': T.labelBg, 'text-background-opacity': 0.85, 'text-background-padding': '3px', 'width': 2, 'line-color': T.edge, 'target-arrow-color': T.edge, 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'arrow-scale': 0.8 }},
    { selector: '.strong-edge', style: { 'width': 3, 'line-color': T.edgeStrong, 'target-arrow-color': T.edgeStrong }},
    { selector: '.weak-edge', style: { 'line-style': 'dashed', 'width': 1, 'line-color': T.edgeWeak, 'target-arrow-color': T.edgeWeak }}
  ],
  elements: /* __GRAPH_DATA__ */{ nodes: [], edges: [] },
  layout: { name: 'preset' },
  minZoom: 0.3, maxZoom: 3, wheelSensitivity: 0.3
});
cy.fit(undefined, 40);

function refreshCytoscapeTheme() {
  readThemeVars();
  cy.style()
    .selector('node').style({ 'color': T.nodeText, 'border-color': T.border })
    .selector('.completed').style({ 'background-color': T.completedBg, 'border-color': T.completed })
    .selector('.active').style({ 'background-color': T.activeBg, 'border-color': T.active })
    .selector('.context').style({ 'background-color': T.ctxBg, 'border-color': T.ctx })
    .selector('.blocked').style({ 'background-color': T.blockedBg, 'border-color': T.blocked })
    .selector('edge').style({ 'color': T.textMuted, 'text-background-color': T.labelBg, 'line-color': T.edge, 'target-arrow-color': T.edge })
    .selector('.strong-edge').style({ 'line-color': T.edgeStrong, 'target-arrow-color': T.edgeStrong })
    .selector('.weak-edge').style({ 'line-color': T.edgeWeak, 'target-arrow-color': T.edgeWeak })
    .update();
}

cy.on('mouseover', 'node', function(evt) {
  evt.target.style('border-width', 4);
  evt.target.connectedEdges().style({ 'width': 3, 'line-color': T.edgeHighlight, 'target-arrow-color': T.edgeHighlight });
});
cy.on('mouseout', 'node', function(evt) {
  evt.target.style('border-width', 2);
  evt.target.connectedEdges().forEach(function(edge) {
    if (edge.hasClass('strong-edge')) edge.style({ 'width': 3, 'line-color': T.edgeStrong, 'target-arrow-color': T.edgeStrong });
    else if (edge.hasClass('weak-edge')) edge.style({ 'width': 1, 'line-color': T.edgeWeak, 'target-arrow-color': T.edgeWeak });
    else edge.style({ 'width': 2, 'line-color': T.edge, 'target-arrow-color': T.edge });
  });
});
</script>
</body>
</html>
