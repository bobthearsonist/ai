<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Portable AI Toolkit</title>
  <desc id="desc">A splash image showing skills, agents, hooks, rules, prompts, and permissions becoming portable across AI clients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09111f"/>
      <stop offset="50%" stop-color="#102a45"/>
      <stop offset="100%" stop-color="#251447"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="36" fill="url(#bg)"/>
  <circle cx="205" cy="85" r="180" fill="url(#glowBlue)"/>
  <circle cx="990" cy="330" r="210" fill="url(#glowPurple)"/>
  <path d="M0 328 C180 260 250 390 430 322 C610 254 690 120 890 176 C1010 210 1080 302 1200 250 L1200 420 L0 420 Z" fill="#0f172a" opacity="0.45"/>

  <g opacity="0.26" stroke="#e0f2fe" stroke-width="1">
    <path d="M132 302 C272 190 370 238 500 162"/>
    <path d="M708 112 C812 192 906 158 1048 254"/>
    <path d="M150 118 C310 154 364 88 526 118"/>
    <path d="M670 294 C780 246 914 314 1058 206"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="80" y="103" width="235" height="64" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="198" y="130" text-anchor="middle" fill="#bae6fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">SKILLS</text>
    <text x="198" y="151" text-anchor="middle" fill="#e0f2fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">reusable know-how</text>

    <rect x="80" y="181" width="235" height="64" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
    <text x="198" y="208" text-anchor="middle" fill="#ddd6fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">AGENTS</text>
    <text x="198" y="229" text-anchor="middle" fill="#ede9fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">specialists that travel</text>

    <rect x="80" y="259" width="235" height="64" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="198" y="286" text-anchor="middle" fill="#cffafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">HOOKS</text>
    <text x="198" y="307" text-anchor="middle" fill="#ecfeff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">automation around tools</text>

    <rect x="442" y="132" width="316" height="190" rx="28" fill="#111827" stroke="url(#accent)" stroke-width="3"/>
    <text x="600" y="178" text-anchor="middle" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800">PORTABLE AI TOOLKIT</text>
    <text x="600" y="213" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">sync once, reuse everywhere</text>
    <rect x="484" y="237" width="232" height="44" rx="22" fill="url(#accent)" opacity="0.95"/>
    <text x="600" y="265" text-anchor="middle" fill="#020617" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">~/AI shared surface</text>
    <rect x="478" y="296" width="76" height="28" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
    <text x="516" y="315" text-anchor="middle" fill="#e0f2fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700">rules</text>
    <rect x="562" y="296" width="84" height="28" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <text x="604" y="315" text-anchor="middle" fill="#ede9fe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700">prompts</text>
    <rect x="654" y="296" width="96" height="28" rx="14" fill="#1e293b" stroke="#f472b6" stroke-width="1"/>
    <text x="702" y="315" text-anchor="middle" fill="#fce7f3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700">permissions</text>

    <rect x="890" y="102" width="210" height="58" rx="16" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="995" y="137" text-anchor="middle" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">GitHub Copilot</text>

    <rect x="890" y="181" width="210" height="58" rx="16" fill="#2e1065" stroke="#c084fc" stroke-width="2"/>
    <text x="995" y="216" text-anchor="middle" fill="#f3e8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">Claude Code</text>

    <rect x="890" y="260" width="210" height="58" rx="16" fill="#164e63" stroke="#22d3ee" stroke-width="2"/>
    <text x="995" y="295" text-anchor="middle" fill="#cffafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">OpenCode + others</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M315 135 C365 142 392 160 442 178" stroke="#38bdf8" stroke-width="5"/>
    <path d="M315 213 C365 213 392 214 442 220" stroke="#a78bfa" stroke-width="5"/>
    <path d="M315 291 C365 288 392 276 442 262" stroke="#22d3ee" stroke-width="5"/>
    <path d="M758 210 C806 132 838 130 890 130" stroke="#60a5fa" stroke-width="5"/>
    <path d="M758 227 C810 210 836 210 890 210" stroke="#c084fc" stroke-width="5"/>
    <path d="M758 246 C806 288 836 289 890 289" stroke="#22d3ee" stroke-width="5"/>
  </g>

  <text x="600" y="374" text-anchor="middle" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="900">Build once. Carry everywhere.</text>
</svg>
