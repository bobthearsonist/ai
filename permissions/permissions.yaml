# Unified AI Tool Permissions Configuration
#
# Canonical source of truth for MCP servers and command permissions across:
#   - Claude Code (~/.claude/settings.json)
#   - GitHub Copilot (VSCode mcp.json + settings.json)
#   - OpenCode (~/.config/opencode/opencode.json)
#   - Cline (VSCode globalStorage/saoudrizwan.claude-dev/settings/cline_mcp_settings.json)
#   - Kilo Code (VSCode globalStorage/kilocode.kilo-code/settings/mcp_settings.json + settings)
#
# This file contains ONLY commands already configured in your existing tools.

# =============================================================================
# MCP SERVERS
# =============================================================================

mcp_servers:
  memory:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-memory"]
    env:
      MEMORY_FILE_PATH: "{{HOME}}/ai/memory/memory.jsonl"
    description: Persistent memory for cross-session context
    auto_approve:
      - create_entities
      - create_relations
      - add_observations
      - delete_entities
      - delete_observations
      - delete_relations
      - read_graph
      - search_nodes
      - open_nodes

  sequential-thinking:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    description: Structured thinking for complex problem solving
    auto_approve:
      - sequentialthinking

  context7:
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
    description: Documentation context provider
    auto_approve:
      - resolve-library-id
      - query-docs

  azure-devops:
    command: npx
    args: ["-y", "@azure-devops/mcp", "{{ADO_ORG}}"]
    description: Azure DevOps integration (org from local.yaml work.ado_org)
    auto_approve: []

  kapture:
    description: Browser DevTools via Kapture MCP extension
    auto_approve:
      - "*"

  agentgateway:
    description: Agent gateway proxy for multiple MCP servers
    auto_approve:
      - "context7_resolve-library-id"
      - "context7_query-docs"
      - "memory_*"
      - "sequential-thinking_*"
      - "hass-mcp_*"
      - "playwright_*"
      - "browser-use_*"

  chrome-devtools:
    command: npx
    args: ["-y", "@executeautomation/chrome-devtools-mcp"]
    description: Chrome DevTools for browser automation
    disabled: true
    auto_approve: []

  qdrant-work:
    type: remote
    url: "http://localhost:7020/servers/qdrant-work/sse"
    description: Qdrant vector DB for work items and ADO knowledge (via Docker mcp-proxy)
    auto_approve: []

  qdrant-code:
    type: remote
    url: "http://localhost:7020/servers/qdrant-code/sse"
    description: Qdrant vector DB for repository/code indexing (via Docker mcp-proxy)
    auto_approve: []

# =============================================================================
# DIRECTORIES
# =============================================================================

additional_directories:
  - "C:\\Repositories"

# =============================================================================
# FILE ACCESS PERMISSIONS
# =============================================================================
# Path-based permissions for read/glob/grep operations outside workspace.
# Uses {{HOME}} placeholder expanded per-platform (~, $HOME, %USERPROFILE%).
#
# Client support:
#   - Claude Code: permissions.allow/ask/deny with Tool(path) syntax
#   - OpenCode: workspaces + file permissions in opencode.json
#   - Cline/Kilo: alwaysAllowReadOnly + custom instructions
#   - Copilot: limited (workspace-scoped by default)

file_access:
  # ---------------------------------------------------------------------------
  # ALLOW - Auto-approve reads in these locations
  # ---------------------------------------------------------------------------
  allow:
    - "{{HOME}}/**"                    # All user files

  # ---------------------------------------------------------------------------
  # ASK - Prompt before accessing (sensitive but sometimes needed)
  # ---------------------------------------------------------------------------
  ask:
    # --- Credentials & Keys ---
    - "{{HOME}}/.ssh/**"               # SSH keys
    - "{{HOME}}/.gnupg/**"             # GPG keys
    - "{{HOME}}/.aws/**"               # AWS credentials
    - "{{HOME}}/.azure/**"             # Azure credentials
    - "{{HOME}}/.kube/config"          # Kubernetes config
    - "{{HOME}}/.netrc"                # Network credentials
    - "{{HOME}}/.npmrc"                # npm auth tokens
    - "{{HOME}}/.pypirc"               # PyPI auth tokens
    - "{{HOME}}/.docker/config.json"   # Docker auth

    # --- Environment & Secrets (any location) ---
    - "**/.env"                        # Environment files
    - "**/.env.*"                      # Environment variants
    - "**/credentials*"                # Anything named credentials
    - "**/secrets/**"                  # Secrets directories
    - "**/*.pem"                       # Certificates/keys
    - "**/*.key"                       # Private keys
    - "**/id_rsa*"                     # SSH private keys
    - "**/id_ed25519*"                 # SSH ED25519 keys

  # ---------------------------------------------------------------------------
  # DENY - Never allow access (uncomment to hard-block)
  # ---------------------------------------------------------------------------
  # deny:
  #   - "{{HOME}}/.password-store/**"  # Pass password manager
  #   - "{{HOME}}/.gnupg/private-keys-v1.d/**"

# =============================================================================
# TOOL PERMISSIONS (Claude Code, OpenCode)
# =============================================================================

tools:
  read: allow
  write: ask
  edit: ask
  glob: allow
  grep: allow
  task: allow
  skill: allow
  web_fetch: allow
  web_search: allow
  todo_write: allow
  notebook_edit: ask
  external_directory: allow

# =============================================================================
# COMMAND PERMISSIONS
# =============================================================================
# Union of commands from: Claude Code, Copilot, OpenCode, Kilo
# ask/deny categories from OpenCode (only client with explicit categories)

commands:
